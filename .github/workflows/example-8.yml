name: "Example 8: Catch invalid environment files"

on:
  pull_request:
    branches:
      - "*"
    paths:
      - "src/**"
      - "!src/__tests__/**"
      - "dist/**"
      - "action.yml"
      - "etc/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/example-8.yml"
  push:
    branches:
      - "develop"
      - "main"
      - "master"
    paths:
      - "src/**"
      - "!src/__tests__/**"
      - "dist/**"
      - "action.yml"
      - "etc/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/example-8.yml"
  schedule:
    # Note that cronjobs run on master/main by default
    - cron: "0 0 * * *"

concurrency:
  group:
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  example-8:
    # prevent cronjobs from running on forks
    if:
      (github.event_name == 'schedule' && github.repository ==
      'conda-incubator/setup-miniconda') || (github.event_name != 'schedule')
    name: Ex8 (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.8", "3.11"]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./
        id: setup-miniconda
        continue-on-error: true
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          environment-file: etc/example-faulty-environment.yml
      - name: Check previous step failed
        shell: bash
        if: always()
        run: ${{ steps.setup-miniconda.outcome == 'failure' }}
