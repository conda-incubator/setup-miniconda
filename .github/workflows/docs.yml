name: "Docs"

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - "develop"
      - "main"
      - "master"

concurrency:
  group:
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    name: Build & Deploy API docs
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: write
    environment:
      name:
        ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' &&
        'github-pages' || '' }}
      url:
        ${{ steps.pages.outputs.page_url || steps.netlify.outputs.deploy_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: |
          npm ci
          npm run docs

      # GitHub Pages — only on push to main
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/api
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      # Netlify preview — only on PRs (excluding Dependabot, which has no secrets access)
      - if:
          github.event_name == 'pull_request' && github.actor !=
          'dependabot[bot]'
        name: Deploy to Netlify
        id: netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          netlify deploy \
            --dir=docs/api \
            --alias=deploy-preview-${{ github.event.pull_request.number }} \
            --message="PR #${{ github.event.pull_request.number }}" \
            --json > deploy_output.json
          DEPLOY_URL=$(jq -r '.deploy_url' deploy_output.json)
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - if:
          github.event_name == 'pull_request' && github.actor !=
          'dependabot[bot]'
        name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: netlify-preview
          message: |
            ### API Docs Preview

            **Preview URL:** ${{ steps.netlify.outputs.deploy_url }}
            **Commit:** `${{ github.event.pull_request.head.sha }}`

            _Updated on every push. Powered by Netlify._
