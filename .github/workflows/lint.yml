name: "Linting"

on:
  pull_request:
    branches:
      - "*"
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.md"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - ".eslintrc.cjs"
      - ".eslintignore"
      - ".prettierrc"
  push:
    branches:
      - "develop"
      - "main"
      - "master"
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.md"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - ".eslintrc.cjs"
      - ".eslintignore"
      - ".prettierrc"

concurrency:
  group:
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: |
          # ci: install exact versions from package-lock.json
          #     fast, secure, predictable compared to npm install
          npm ci
          npm run check
